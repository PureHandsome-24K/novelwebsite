<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: #333;
            font-size: 28px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input[type="text"],
        .form-group input[type="password"],
        .form-group input[type="email"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #666;
        }

        .remember-me input {
            margin-right: 8px;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .toggle-btn {
            width: 100%;
            padding: 12px;
            background: #f8f9fa;
            color: #667eea;
            border: 1px solid #e1e1e1;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-btn:hover {
            background: #e9ecef;
        }

        .language-switch {
            text-align: center;
            margin-top: 25px;
        }

        .language-switch a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
            font-size: 14px;
        }

        .language-switch a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            text-align: center;
            margin-bottom: 15px;
        }

        .register-form {
            display: none;
        }

        .code-row {
            display: flex;
            gap: 10px;
        }
        .code-row input {
            flex: 1;
        }
        .get-code-btn {
            white-space: nowrap;
            padding: 0 15px;
            border: 2px solid #667eea;
            background: #667eea;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
        }
        .get-code-btn:active{
            opacity:0.8;
        }
        .pwd-match {
            color: #27ae60;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .pwd-mismatch {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <h2 id="formTitle" th:text="#{login.tip}">请登录</h2>
    </div>

    <form id="loginForm" class="form-signin" th:action="@{/login}" method="post">
        <p class="error-msg" th:if="${param.error}" th:text="'用户名或密码错误'" style="color: red;"></p>

        <div class="form-group">
            <label th:text="#{login.username}">用户名</label>
            <input type="text" name="username" th:placeholder="#{login.username}" required autofocus>
        </div>

        <div class="form-group">
            <label th:text="#{login.password}">密码</label>
            <input type="password" name="password" th:placeholder="#{login.password}" required>
        </div>

        <div class="form-options">
            <label class="remember-me">
                <input type="checkbox" name="remember-me" value="remember-me">
                <span th:text="#{login.remberme}">记住我</span>
            </label>
        </div>

        <button class="login-btn" type="submit" th:text="#{login.btn}">登录</button>
        <button class="toggle-btn" type="button" onclick="showRegister()">去注册</button>

        <div class="language-switch">
            <a th:href="@{/(l='zh_CN')}">中文</a>
            <a th:href="@{/(l='en_US')}">English</a>
        </div>
    </form>

    <form id="registerForm" class="form-signin register-form" th:action="@{/register}" method="post">
        <div class="form-group">
            <label>注册邮箱</label>
            <input type="email" name="email" placeholder="请输入注册邮箱" required autofocus>
        </div>

        <div class="form-group">
            <label>邮箱验证码</label>
            <div class="code-row">
                <input type="text" name="emailCode" placeholder="请输入6位验证码" maxlength="6" required>
                <button type="button" class="get-code-btn" id="sendCodeBtn">获取验证码</button>
            </div>
        </div>

        <div class="form-group">
            <label>设置密码</label>
            <input type="password" id="password" name="password" placeholder="请设置登录密码" required>
        </div>

        <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="repassword" name="repassword" placeholder="再次输入密码" required>
            <div id="pwdMatchMsg" class="pwd-match">密码一致</div>
            <div id="pwdMismatchMsg" class="pwd-mismatch">两次密码不一致</div>
        </div>

        <button class="login-btn" type="submit">立即注册</button>
        <button class="toggle-btn" type="button" onclick="showLogin()">返回登录</button>
    </form>
</div>

<script>
    function showRegister() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('formTitle').innerText = '用户注册';
    }
    function showLogin() {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('formTitle').innerText = '请登录';
    }

    let countdown = 60;
    const sendBtn = document.getElementById('sendCodeBtn');
    sendBtn.addEventListener('click',function(){
        let email = document.querySelector('input[name="email"]').value.trim();
        if(!email){
            alert('请先填写注册邮箱');
            return;
        }

        $.ajax({
            url: '/sendMail',
            type: 'POST',
            data: { email: email },
            success: function(data) {
                if(data.success){
                    alert('验证码已发送，请查收邮箱');
                    sendBtn.disabled = true;
                    sendBtn.innerText = countdown + 's后重发';
                    let timer = setInterval(()=>{
                        countdown--;
                        sendBtn.innerText = countdown + 's后重发';
                        if(countdown <= 0){
                            clearInterval(timer);
                            sendBtn.disabled = false;
                            sendBtn.innerText = '获取验证码';
                            countdown = 60;
                        }
                    },1000)
                } else {
                    alert('发送失败：' + data.message);
                }
            },
            error: function(xhr, status, error) {
                alert('网络错误：' + error);
            }
        });
    })

    function checkPasswordMatch() {
        let pwd = document.getElementById('password').value;
        let repwd = document.getElementById('repassword').value;
        let matchMsg = document.getElementById('pwdMatchMsg');
        let mismatchMsg = document.getElementById('pwdMismatchMsg');

        if(repwd.length === 0) {
            matchMsg.style.display = 'none';
            mismatchMsg.style.display = 'none';
            return;
        }

        if(pwd === repwd) {
            matchMsg.style.display = 'block';
            mismatchMsg.style.display = 'none';
        } else {
            matchMsg.style.display = 'none';
            mismatchMsg.style.display = 'block';
        }
    }

    document.getElementById('password').addEventListener('blur', checkPasswordMatch);
    document.getElementById('repassword').addEventListener('blur', checkPasswordMatch);
</script>
</body>
</html>
